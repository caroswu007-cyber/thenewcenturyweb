<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Macro: very faint, soft tonal mottling — barely-there warmth variation -->
    <filter id="macro" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="5" stitchTiles="stitch" result="raw"/>
      <feGaussianBlur in="raw" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="0" result="g"/>
      <feComponentTransfer in="g">
        <feFuncR type="linear" slope="0.52" intercept="0.25"/>
        <feFuncG type="linear" slope="0.52" intercept="0.25"/>
        <feFuncB type="linear" slope="0.52" intercept="0.25"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#macro)" fill="#ffffff"/>
</svg>
